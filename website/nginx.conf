server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/html application/javascript application/json;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(css|js|ico|png|jpg|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Legal pages — clean URLs without .html
    location ~ ^/(eula|privacy|terms)(/)?$ {
        try_files $uri $uri/ /${1}/index.html =404;
    }

    # Catch-all: do NOT serve anything at root (landing page handles that)
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /eula/index.html;
}
