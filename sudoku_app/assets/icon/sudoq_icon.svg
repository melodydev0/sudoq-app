<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep Blue to Purple Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a1a6b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle inner shadow -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur"/>
      <feOffset in="blur" dx="0" dy="0" result="offsetBlur"/>
      <feFlood flood-color="#6b3fa0" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feComposite in="shadow" in2="SourceGraphic" operator="over"/>
    </filter>
    
    <!-- Text shadow for depth -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200" fill="url(#bgGradient)"/>
  
  <!-- Decorative subtle grid pattern in background -->
  <g opacity="0.05">
    <line x1="341" y1="100" x2="341" y2="924" stroke="white" stroke-width="2"/>
    <line x1="512" y1="100" x2="512" y2="924" stroke="white" stroke-width="2"/>
    <line x1="683" y1="100" x2="683" y2="924" stroke="white" stroke-width="2"/>
    <line x1="100" y1="341" x2="924" y2="341" stroke="white" stroke-width="2"/>
    <line x1="100" y1="512" x2="924" y2="512" stroke="white" stroke-width="2"/>
    <line x1="100" y1="683" x2="924" y2="683" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Main Q Letter -->
  <g filter="url(#textShadow)">
    <!-- Q circle part -->
    <circle cx="460" cy="420" r="240" fill="none" stroke="white" stroke-width="85"/>
    
    <!-- Q tail going diagonally down-right -->
    <line x1="580" y1="540" x2="720" y2="680" stroke="white" stroke-width="85" stroke-linecap="round"/>
  </g>
  
  <!-- 3x3 Sudoku Grid as Q tail extension -->
  <g transform="translate(680, 640)">
    <!-- Grid background -->
    <rect x="0" y="0" width="210" height="210" rx="15" ry="15" fill="white"/>
    
    <!-- Grid lines - vertical -->
    <line x1="70" y1="8" x2="70" y2="202" stroke="#2d1b4e" stroke-width="3"/>
    <line x1="140" y1="8" x2="140" y2="202" stroke="#2d1b4e" stroke-width="3"/>
    
    <!-- Grid lines - horizontal -->
    <line x1="8" y1="70" x2="202" y2="70" stroke="#2d1b4e" stroke-width="3"/>
    <line x1="8" y1="140" x2="202" y2="140" stroke="#2d1b4e" stroke-width="3"/>
    
    <!-- Numbers in grid -->
    <text x="35" y="52" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#2d1b4e" text-anchor="middle">5</text>
    <text x="105" y="52" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#2d1b4e" text-anchor="middle">3</text>
    <text x="175" y="52" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#4a1a6b" text-anchor="middle" opacity="0.5">?</text>
    
    <text x="35" y="122" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#2d1b4e" text-anchor="middle">6</text>
    <text x="105" y="122" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#4a1a6b" text-anchor="middle" opacity="0.5">?</text>
    <text x="175" y="122" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#2d1b4e" text-anchor="middle">1</text>
    
    <text x="35" y="192" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#4a1a6b" text-anchor="middle" opacity="0.5">?</text>
    <text x="105" y="192" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#2d1b4e" text-anchor="middle">9</text>
    <text x="175" y="192" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#2d1b4e" text-anchor="middle">8</text>
  </g>
  
  <!-- Decorative sparkle/shine effects -->
  <g opacity="0.6">
    <circle cx="280" cy="280" r="8" fill="white"/>
    <circle cx="180" cy="450" r="5" fill="white"/>
    <circle cx="750" cy="200" r="6" fill="white"/>
  </g>
</svg>
